{% extends "base.html" %}
{% block title %}{{ page.title }} — ForgePrompt{% endblock %}

{% block content %}
<div style="max-width:820px;margin:0 auto;padding:48px 24px">
  <div style="margin-bottom:32px">
    <h1 style="font-size:2rem;font-weight:800;margin:0 0 8px">{{ page.title }}</h1>
    {% if page.get('updated') %}
      <div style="font-size:.8rem;color:var(--clr-muted);font-family:var(--font-mono)">
        Last updated {{ page.updated[:10] }}
      </div>
    {% endif %}
  </div>

  <div class="custom-page-content">
    {{ page.content | safe }}
  </div>
</div>

<style>
.custom-page-content { line-height:1.75; font-size:.95rem; }
.custom-page-content h1 { font-size:1.7rem; font-weight:800; margin:1.5em 0 .6em; }
.custom-page-content h2 { font-size:1.3rem; font-weight:700; margin:1.4em 0 .5em; border-bottom:1px solid var(--clr-border); padding-bottom:.4em; }
.custom-page-content h3 { font-size:1.1rem; font-weight:700; margin:1.2em 0 .4em; }
.custom-page-content p  { margin:.8em 0; }
.custom-page-content ul,
.custom-page-content ol { margin:.8em 0 .8em 1.8em; }
.custom-page-content li { margin:.3em 0; }
.custom-page-content a  { color:var(--clr-accent); }
.custom-page-content a:hover { text-decoration:underline; }
.custom-page-content blockquote {
  border-left:3px solid var(--clr-accent);
  margin:.8em 0; padding:.5em 1em;
  background:rgba(0,255,136,.05);
  border-radius:0 6px 6px 0;
  color:var(--clr-muted);
}
.custom-page-content code {
  font-family:var(--font-mono); font-size:.85em;
  background:rgba(255,255,255,.05); padding:2px 6px; border-radius:4px;
}
.custom-page-content pre {
  background:rgba(255,255,255,.04); border:1px solid var(--clr-border);
  border-radius:8px; padding:16px; overflow-x:auto; font-size:.82rem;
}
</style>
{% endblock %}

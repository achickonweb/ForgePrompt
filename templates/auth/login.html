{% extends "base.html" %}
{% block title %}Log In{% endblock %}

{% block content %}
<section class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="logo-bracket">[</span>ForgePrompt<span class="logo-bracket">]</span>
    </div>
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Log in to upvote, bookmark and submit prompts.</p>

    {% if error %}
    <div class="auth-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login" class="auth-form">
      <input type="hidden" name="next" value="{{ next }}" />
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" value="{{ username }}" placeholder="yourhandle"
               autocomplete="username" autocapitalize="none" required autofocus />
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="pw-input-wrap">
          <input type="password" name="password" id="loginPw" placeholder="••••••••"
                 autocomplete="current-password" required />
          <button type="button" class="pw-toggle" onclick="togglePw('loginPw', this)">Show</button>
        </div>
      </div>
      <button type="submit" class="btn-primary btn-full">Log in →</button>
    </form>

    <p class="auth-switch">
      No account yet? <a href="/register">Sign up free</a>
    </p>
  </div>
</section>
{% endblock %}
